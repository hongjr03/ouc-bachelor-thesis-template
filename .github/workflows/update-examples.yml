name: Update README Examples

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  update-examples:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Typst
        uses: typst-community/setup-typst@v5

      - name: Download and install Chinese fonts
        run: |
          curl -fL "https://github.com/hongjr03/assets/releases/download/cn-thesis-fonts-2.1-f0dde462e435/cn-thesis-fonts-2.1-f0dde462e435.zip" -o /tmp/cn-thesis-fonts.zip
          rm -rf /tmp/cn-thesis-fonts
          mkdir -p /tmp/cn-thesis-fonts
          unzip -q /tmp/cn-thesis-fonts.zip -d /tmp/cn-thesis-fonts

          mkdir -p "$HOME/.local/share/fonts/cn-thesis"
          find /tmp/cn-thesis-fonts -type f \( -iname '*.ttf' -o -iname '*.otf' -o -iname '*.ttc' \) -exec cp {} "$HOME/.local/share/fonts/cn-thesis/" \;
          fc-cache -f

      - name: Install monospace fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-noto-mono
          fc-cache -f

      - name: Rebuild examples images
        run: |
          just package @preview
          rm -f examples/*.png
          typst compile ./template/main.typ --format png "examples/{p}.png"

      - name: Update README examples and main.typ snippet
        shell: bash
        run: |
          set -euo pipefail

          max_page=$(find examples -maxdepth 1 -type f -name '*.png' -printf '%f\n' \
            | sed 's/\.png$//' \
            | grep -E '^[0-9]+$' \
            | sort -n \
            | tail -n 1)

          if [[ -z "${max_page:-}" ]]; then
            echo "No compiled examples found in examples/*.png" >&2
            exit 1
          fi

          {
            for ((i = 1; i <= max_page; i += 4)); do
              echo '<p align="center">'
              for ((j = i; j < i + 4 && j <= max_page; j++)); do
                echo "  <img src=\"examples/${j}.png\" width=\"24%\" alt=\"第${j}页\" />"
              done
              echo '</p>'
              echo
            done
          } > /tmp/readme-gallery.md

          perl -0777 -i -pe '
            my $gallery = do {
              local $/;
              open my $fh, "<", "/tmp/readme-gallery.md" or die $!;
              <$fh>;
            };
            s@(## 效果预览\s*\n\s*以下是本模板渲染后的论文效果展示。所有预览图片可通过 `examples` 文件夹查看。\s*\n).*?(\n## 快速开始)@$1$gallery\n$2@s;
          ' README.md

          pkg_name=$(sed -n 's/^name = "\([^"]\+\)"/\1/p' typst.toml | head -n 1)
          pkg_version=$(sed -n 's/^version = "\([^"]\+\)"/\1/p' typst.toml | head -n 1)

          if [[ -z "${pkg_name:-}" || -z "${pkg_version:-}" ]]; then
            echo "Failed to read package name/version from typst.toml" >&2
            exit 1
          fi

          init_cmd="typst init @preview/${pkg_name}:${pkg_version}"

          INIT_CMD="$init_cmd" perl -0777 -i -pe '
            my $init_cmd = $ENV{"INIT_CMD"};
            die "INIT_CMD is empty" unless defined $init_cmd && length $init_cmd;

            my $begin = "<!-- README_INIT_CMD:BEGIN -->";
            my $end = "<!-- README_INIT_CMD:END -->";
            my $pattern = qr/\Q$begin\E\s*\n\x60\x60\x60bash\n.*?\n\x60\x60\x60\s*\n\Q$end\E/s;

            die "README init command marker block not found" unless /$pattern/;
            s@$pattern@$begin\n\x60\x60\x60bash\n$init_cmd\n\x60\x60\x60\n$end@s;
          ' README.md

          cp template/main.typ /tmp/readme-main.typ

          perl -0777 -i -pe '
            my $main = do {
              local $/;
              open my $fh, "<", "/tmp/readme-main.typ" or die $!;
              <$fh>;
            };
            $main .= "\n" unless $main =~ /\n\z/;

            my $begin = "<!-- README_MAIN_TYP:BEGIN -->";
            my $end = "<!-- README_MAIN_TYP:END -->";
            my $pattern = qr/\Q$begin\E\s*\n\x60\x60\x60typst\n.*?\n\x60\x60\x60\s*\n\Q$end\E/s;

            die "README main.typ marker block not found" unless /$pattern/;
            s@$pattern@$begin\n\x60\x60\x60typst\n$main\x60\x60\x60\n$end@s;
          ' README.md

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md examples; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md examples
          git commit -m "chore: update examples preview images"
          git push